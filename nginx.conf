# nginx.conf (colócalo en la raíz del repo)
worker_processes auto;
daemon off;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  # Si Traefik establece X-Forwarded-Proto (por defecto lo hace), usamos ese valor
  map $http_x_forwarded_proto $real_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
  }

  # Evitar que nginx genere Location absolutas con el scheme equivocado
  absolute_redirect off;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resuelve /blog -> dist/blog/index.html OR /blog.html sin redirigir a /blog/
    location / {
      try_files $uri $uri.html $uri/index.html =404;
    }

    # Cabeceras de cache para estáticos (opcional)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # Ejemplo: si necesitas forzar un redirect canonical desde un host no-canonical
    # usar una *respuesta relativa* o usar $real_scheme para construir el absolute URL
    # return 301 $real_scheme://$host$request_uri;  # <- solo si realmente lo quieres
  }
}